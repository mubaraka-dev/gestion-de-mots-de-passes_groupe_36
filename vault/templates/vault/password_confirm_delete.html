{% extends "vault/base.html" %}

{% block title %}Supprimer une entree | Vault Web{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card shadow-sm border-danger">
            <div class="card-body p-4">
                <h1 class="h4 text-danger">Confirmation de suppression</h1>
                <p>
                    Voulez-vous vraiment supprimer l'entree <strong>{{ entry.service_name }}</strong>
                    associee a <strong>{{ entry.username }}</strong> ?
                </p>
                <form method="post">
                    {% csrf_token %}
                    <a href="{% url 'password_detail' entry.pk %}" class="btn btn-outline-secondary">Annuler</a>
                    <button type="submit" class="btn btn-danger">Supprimer definitivement</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
